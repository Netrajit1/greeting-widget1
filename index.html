<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Greeting Widget</title>

<style>
body{
    margin:0;
    padding:10px;
    font-family:Segoe UI, Arial, sans-serif;
    background:transparent;
}

#greeting{
    font-size:22px;
    font-weight:600;
    color:#1f2937;
}

#date{
    margin-top:5px;
    font-size:14px;
    color:#6b7280;
}
</style>

</head>

<body>

<div id="greeting"></div>
<div id="date"></div>

<script>

const now = new Date();
const hour = now.getHours();

let greeting = "";

if(hour < 12){
    greeting = "☀️ Hey !!! Good Morning";
}
else if(hour < 17){
    greeting = "🌤️ Hey !!! Good Afternoon";
}
else{
    greeting = "🌙 Hey !!! Good Evening";
}

document.getElementById("greeting").innerHTML = greeting;

const options = {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
};

document.getElementById("date").innerHTML =
    now.toLocaleDateString("en-IN", options);

</script>

</body>
</html>
