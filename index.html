<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">

<style>

body{
    margin:0;
    padding:0;
    background:transparent;
}

/* Greeting */

#greeting{
    font-family:"Mistral", Arial, sans-serif;
    font-size:40px;
    font-weight:500;
    color:#FFFFFF;
    line-height:1.1;
}

/* Date */

#date{
    font-family:"Mistral", Arial, sans-serif;
    font-size:40px;
    color:rgba(255,255,255,0.85);
    margin-top:4px;
    margin-bottom:14px;
}

/* Portal Title */

#portal-title{
    font-family:"Abadi MT Condensed Light", Arial, sans-serif;
    font-size:45px;
    font-weight:600;
    color:#FFFFFF;
    line-height:1.15;
    margin-top:12px;
}

</style>

</head>

<body>

<div id="greeting"></div>

<div id="date"></div>

<div id="portal-title">
Welcome to our Geo-Spatial Information Portal
</div>

<script>

const now = new Date();
const hour = now.getHours();

let greeting = "";

if(hour < 12){
    greeting = "Hey !!! Good Morning";
}
else if(hour < 17){
    greeting = "Hey !!! Good Afternoon";
}
else{
    greeting = "Hey !!! Good Evening";
}

document.getElementById("greeting").innerHTML = greeting;

const options = {
    day: "numeric",
    month: "long",
    year: "numeric"
};

document.getElementById("date").innerHTML =
    now.toLocaleDateString("en-IN", options);

</script>

</body>
</html>
