<body>

<div id="greeting"></div>

<div id="date"></div>

<div id="portal-title">
Welcome to our Geo-Spatial Information Portal
<p style="font-family: Arial, sans-serif;">This is Arial text.</p>

<p style="font-size: 50px;">This text is 16 pixels tall.</p>
            
</div>

<script>

const now = new Date();
const hour = now.getHours();

let greeting = "";

if(hour < 12){
    greeting = "Hey !!! Good Morning";
}
else if(hour < 17){
    greeting = "Hey !!! Good Afternoon";
}
else{
    greeting = "Hey !!! Good Evening";
}

document.getElementById("greeting").innerHTML = greeting;

const options = {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
};

document.getElementById("date").innerHTML =
    now.toLocaleDateString("en-IN", options);

</script>

</body>
